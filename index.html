<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>රශ්මිකගේ 21 වෙනි උපන්දිනය! 🎂</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap');

        body {
            background-image: url('https://images.unsplash.com/photo-1513151233558-d860c5398176?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            font-family: 'Noto Sans Sinhala', 'Segoe UI', sans-serif;
            color: #333;
            overflow-x: hidden;
        }

        /* Snowfall Effect */
        .snowflake {
            color: #fff;
            font-size: 1.2em;
            position: fixed;
            top: -10%;
            z-index: 9999;
            user-select: none;
            animation: fall 10s linear infinite;
        }
        @keyframes fall {
            0% { top: -10%; transform: translateX(0); }
            100% { top: 100%; transform: translateX(100px); }
        }

        .hero {
            background: linear-gradient(135deg, rgba(3, 4, 94, 0.95), rgba(0, 119, 182, 0.8)); 
            color: white;
            padding: 70px 0 50px;
            border-radius: 0 0 50px 50px;
            margin-bottom: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .rashmika-photo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 6px solid #fff;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        .upload-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .wish-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .wish-card:hover { transform: translateY(-10px); }

        .wish-card img, .wish-card video {
            width: 100%;
            height: 280px;
            object-fit: cover;
            cursor: pointer; /* ටච් කරන්න පුළුවන් බව පෙන්වන්න */
        }

        .wish-msg {
            padding: 20px;
            font-weight: 700;
            text-align: center;
            color: #03045e;
        }

        /* Modal styling for Full View */
        .modal-content {
            background: rgba(0,0,0,0.8);
            border: none;
            border-radius: 20px;
        }
        #modalContent img, #modalContent video {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 10px;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            margin-top: 50px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 40px 40px 0 0;
        }
    </style>
</head>
<body>

<div class="snowflakes" id="snowflakes"></div>

<div class="hero text-center">
    <div class="container">
        <img id="rashmikaPhoto" src="https://res.cloudinary.com/dokzdfdwe/image/upload/v1774203166/WhatsApp_Image_2026-03-22_at_23.40.59_tjm3km.jpg" alt="Rashmika" class="rashmika-photo"> 
        <h1 class="display-4 fw-bold">රශ්මිකගේ 21 වෙනි උපන්දිනය! 🎉🎂</h1>
        <p class="lead">මුගෙ මොනව හරි තියේ නම් මේකට දාපල්ලා...</p>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 upload-card">
            <h5 class="text-center mb-4 fw-bold">ඔයාගේ මතකය/සුබ පැතුම එක් කරන්න</h5>
            <input type="file" id="fileInput" class="form-control mb-3" accept="image/*,video/*">
            <textarea id="msgInput" class="form-control mb-3" placeholder="ඔයාගේ සුබ පැතුම මෙතන ලියන්න..." rows="3"></textarea>
            <button id="uploadBtn" class="btn btn-primary w-100 fw-bold btn-lg shadow">Upload & Wish Now!</button>
            <div id="status" class="text-center small mt-3 fw-bold"></div>
        </div>
    </div>

    <div class="row mt-5" id="gallery">
        </div>
</div>

<div class="modal fade" id="mediaModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-body p-2 text-center position-relative">
                <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-2" data-bs-dismiss="modal"></button>
                <div id="modalContent"></div>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container">
        <p class="fw-bold">මිතුරන් විසින් :- පාටි දීපම් මේ ඔක්කොම අයින් කරනව සත්තයි...</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    // --- පල්ලෙහා තියෙන විස්තර ඔයාගේ Firebase එකෙන් පුරවන්න ---
    const firebaseConfig = {
        apiKey: "AIzaSyC8oDJIXC6ZgZPX8Ir46dh6U_kcCX4n-H4",
        authDomain: "rashmika-a00aa.firebaseapp.com",
        projectId: "rashmika-a00aa",
        storageBucket: "rashmika-a00aa.firebasestorage.app",
        messagingSenderId: "80141055423",
        appId: "1:80141055423:web:44de100f94e8c645a05d0a",
    };

    const CLOUD_NAME = "dokzdfdwe"; 
    const UPLOAD_PRESET = "rashmika_preset"; 

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const msgInput = document.getElementById('msgInput');
    const status = document.getElementById('status');
    const gallery = document.getElementById('gallery');

    // Snowfall generation
    const snowContainer = document.getElementById('snowflakes');
    for (let i = 0; i < 20; i++) {
        const flake = document.createElement('div');
        flake.className = 'snowflake';
        flake.innerHTML = '❄';
        flake.style.left = Math.random() * 100 + 'vw';
        flake.style.animationDuration = (Math.random() * 5 + 5) + 's';
        flake.style.opacity = Math.random();
        snowContainer.appendChild(flake);
    }

    // Modal එක පෙන්වන function එක
    window.viewMedia = (url, type) => {
        const modalContent = document.getElementById('modalContent');
        if (type === 'image') {
            modalContent.innerHTML = `<img src="${url}" class="img-fluid">`;
        } else {
            modalContent.innerHTML = `<video src="${url}" controls autoplay style="width:100%"></video>`;
        }
        const myModal = new bootstrap.Modal(document.getElementById('mediaModal'));
        myModal.show();
    };

    uploadBtn.onclick = async () => {
        const file = fileInput.files[0];
        if (!file) return alert("කරුණාකර පින්තූරයක් හෝ වීඩියෝවක් තෝරන්න!");

        uploadBtn.disabled = true;
        status.innerText = "Cloud එකට Upload වෙනවා...";

        try {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            await addDoc(collection(db, "rashmika_wishes"), {
                url: data.secure_url,
                message: msgInput.value,
                type: file.type.startsWith('image') ? 'image' : 'video',
                time: new Date()
            });

            status.innerText = "සාර්ථකව එක් කළා! ✅";
            fileInput.value = ""; msgInput.value = "";
        } catch (e) {
            status.innerText = "Error එකක් ආවා!";
        }
        uploadBtn.disabled = false;
    };

    const q = query(collection(db, "rashmika_wishes"), orderBy("time", "desc"));
    onSnapshot(q, (snap) => {
        gallery.innerHTML = "";
        snap.forEach(doc => {
            const item = doc.data();
            let media = item.type === 'image' 
                ? `<img src="${item.url}" onclick="viewMedia('${item.url}', 'image')">` 
                : `<video src="${item.url}" onclick="viewMedia('${item.url}', 'video')"></video>`;
            
            gallery.innerHTML += `
                <div class="col-md-4 col-sm-6">
                    <div class="wish-card shadow">
                        ${media}
                        <div class="wish-msg">${item.message || 'Happy Birthday! 🎉'}</div>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>
